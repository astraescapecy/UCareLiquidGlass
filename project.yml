name: UCareLiquidGlass
options:
  bundleIdPrefix: com.ucare
  deploymentTarget:
    iOS: "17.0"
fileGroups:
  - Configuration
targets:
  UCareLiquidGlass:
    type: application
    platform: iOS
    sources:
      - path: Sources/UCareLiquidGlass
      - path: Resources
        buildPhase: resources
    scheme:
      storeKitConfiguration: Configuration/UCareLiquidGlass.storekit
    entitlements:
      path: Configuration/UCareLiquidGlass.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ucare.liquidglass
      SWIFT_VERSION: "5.10"
      TARGETED_DEVICE_FAMILY: "1"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: UCare
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_NSUserNotificationsUsageDescription: UCare sends local reminders for water, routines, and gentle streak nudges you enable. No ads and no marketing pings.
      INFOPLIST_KEY_NSHealthShareUsageDescription: UCare can read dietary water and sleep from Apple Health to blend into your Glow-Up Score on this device. Nothing is uploaded to our servers.
